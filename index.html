<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Undangan Pernikahan Yayan & Ani</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff5f7;
text-align:center;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
position:relative;
}

.photo{
width:35%;
padding:20px;
}

.photo img{
width:100%;
border:8px solid #ffffff;
box-shadow:0 0 15px rgba(0,0,0,0.2);
border-radius:15px;
}

.middle{
width:30%;
text-align:center;
padding:20px;
position:relative;
}

h1{
font-size:40px;
color:#b30059;
}

h2{
margin-top:10px;
}

.flower{
font-size:60px;
margin:20px 0;
}

.info{
font-size:18px;
margin-top:15px;
}

/* gorilla background */

.gorilla{
position:absolute;
width:260px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
opacity:0.95;
filter:blur(0.2px);
z-index:-1;
}

/* popup gambar */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup img{
max-width:80%;
border-radius:15px;
box-shadow:0 0 20px black;
}

</style>

</head>

<body>

<div class="container">

<div class="photo">
<img src="foto1.png">
</div>

<div class="middle">

<img src="gorilla.png" class="gorilla">

<div class="flower">🌸🌷🌸</div>

<h1>Yayan & Ani</h1>

<h2>Undangan Pernikahan</h2>

<div class="info">
📅 2 April 2026<br><br>
📍 Maros Waterpark
</div>

<div class="flower">🌸🌷🌸</div>

</div>

<div class="photo">
<img src="foto2.png">
</div>

</div>

<!-- POPUP FOTO -->

<div class="popup" id="popupFoto">
<img src="foto_popup.png">
</div>

<!-- AUDIO -->

<audio id="suara">
<source src="suara.mp3" type="audio/mpeg">
</audio>

<script>

/* popup setelah 3 detik + suara */

setTimeout(function(){

document.getElementById("popupFoto").style.display="flex";

document.getElementById("suara").play();

},3000);

</script>

</body>
</html>
